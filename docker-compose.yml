services:
  db:
    image: postgres:17
    container_name: blogmkt_db
    restart: always
    environment:
      - POSTGRES_USER=blogmkt
      - POSTGRES_PASSWORD=blogmkt
      - POSTGRES_DB=blogmkt
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: blogmkt_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+psycopg://blogmkt:blogmkt@db:5432/blogmkt
    depends_on:
      - db

volumes:
  postgres_data:
